name: Build Executables and Create Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller --onefile --name suapcd main.py

      - name: Rename executable with version
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            mv dist/suapcd dist/suapcd-${{ github.ref_name }}-linux
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv dist/suapcd.exe dist/suapcd-${{ github.ref_name }}-windows.exe
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: suapcd-${{ matrix.os }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            Lançamento da versão ${{ github.ref_name }} do SUAP-CD.
            - Coletor de dados para verificação de patrimônio (Linux e Windows).
          files: |
            artifacts/suapcd-ubuntu-latest/suapcd-${{ github.ref_name }}-linux
            artifacts/suapcd-windows-latest/suapcd-${{ github.ref_name }}-windows.exe