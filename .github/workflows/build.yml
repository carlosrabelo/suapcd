name: Build Executables and Create Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller --onefile --name suapcd app.py

      - name: Rename executable for Linux
        if: matrix.os == 'ubuntu-latest'
        run: mv dist/suapcd dist/suapcd-${{ github.ref_name }}-linux

      - name: Rename executable for Windows
        if: matrix.os == 'windows-latest'
        run: ren dist\suapcd.exe suapcd-${{ github.ref_name }}-windows.exe

      - name: Install Inno Setup (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install innosetup -y
        env:
          CHOCOLATEY_INSTALL: C:\ProgramData\chocolatey

      - name: Build Inno Setup Installer (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          iscc /DAppVersion=${{ github.ref_name }} setup.iss
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: suapcd-${{ matrix.os }}
          path: |
            dist/suapcd-${{ github.ref_name }}-linux
            dist/suapcd-${{ github.ref_name }}-windows.exe
            dist/SUAP-CD-${{ github.ref_name }}-Setup.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            Lançamento da versão ${{ github.ref_name }} do SUAP-CD.
            - Coletor de dados para verificação de patrimônio (Linux e Windows).
            - Inclui instalador para Windows.
          files: |
            artifacts/suapcd-ubuntu-latest/suapcd-${{ github.ref_name }}-linux
            artifacts/suapcd-windows-latest/suapcd-${{ github.ref_name }}-windows.exe
            artifacts/suapcd-windows-latest/SUAP-CD-${{ github.ref_name }}-Setup.exe